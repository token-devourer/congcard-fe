name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
          cache: npm
      - run: npm ci
      - run: npm run typecheck --workspaces=false
      - run: npm test --workspaces=false
      - run: npm run build --workspaces=false
      - run: npm audit --omit=dev --audit-level=high --workspaces=false
